<!DOCTYPE html>
<html lang="es">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>JxLiveRadio - Web Player</title>
 <link rel="icon" type="image/svg+xml" href="./logo.svg">
 <style>
  * {
   margin: 0;
   padding: 0;
   box-sizing: border-box;
  }

  body {
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
   background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
   min-height: 100vh;
   display: flex;
   align-items: center;
   justify-content: center;
   padding: 20px;
  }

  .container {
   z-index: 0;
   min-width: 20.5rem;
   background: white;
   border-radius: 16px;
   padding: 28px;
   max-width: 400px;
   box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  h1 {
   text-align: center;
   margin-bottom: 10px;
   color: #333;
   font-size: 1.9rem;
  }

  .logo {
   z-index: -10;
   position: relative;
   margin-top: -10.5rem;
   left: -5rem;
   width: 9rem;
   transform: rotate(-0.095turn);
  }

  .status {
   text-align: center;
   color: #999;
   font-size: 14px;
   margin-bottom: 30px;
  }

  h1,
  .status {
   text-align: right;
}

  .player {
   background: #f5f5f5;
   border-radius: 12px;
   padding: 20px;
   margin-bottom: 20px;
   text-align: center;
  }

  audio {
   width: 100%;
   margin-bottom: 15px;
  }

  .stream-info {
   background: #f0f0f0;
   padding: 12px;
   border-radius: 8px;
   margin-bottom: 15px;
   font-size: 12px;
   color: #666;
   word-break: break-all;
  }

  button {
   width: 100%;
   padding: 12px;
   margin-bottom: 10px;
   border: none;
   border-radius: 8px;
   font-size: 16px;
   font-weight: 600;
   cursor: pointer;
   transition: all 0.3s;
  }

  .btn-play {
   background: #667eea;
   color: white;
  }

  .btn-play:hover {
   background: #5568d3;
  }

  .btn-stop {
   background: #e74c3c;
   color: white;
  }

  .btn-stop:hover {
   background: #c0392b;
  }

  .info {
    display: none;
    min-width: 18rem;
    height: 10rem;
    background: #ddd;
    border: 1px solid #888;
    color: #333;
    padding: 1rem;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
  }

  .playbtn {
   display: flex;
   flex-direction: column;
   justify-content: center;
   height: 8rem;
   margin: 0 auto
  }

  .connecting-banner {
   display: none;
   background: #fff3cd;
   color: #856404;
   border: 1px solid #ffc107;
   border-radius: 8px;
   padding: 10px 14px;
   margin-bottom: 12px;
   font-size: 13px;
   text-align: center;
   line-height: 1.5;
  }

  .connecting-banner.visible {
   display: block;
   max-width: 15rem;
  }
 </style>
</head>

<body>
 <div class="container">
  <h1 id="stationTitle">JxLiveRadio</h1>
  <p class="status">Escuchá la transmisión en vivo</p>

  <img class="logo" src="./logo.svg" alt="logo">

  <div class="player">
   <div class="connecting-banner" id="connectingBanner">
    <p>⏳ Conectando…<br/>Espere unos segundos. Recargue la página si no empieza a reproducir en los próximos 10 segundos.</p>
   </div>
   <audio id="player" controls preload="none" src="/audio"></audio>
   <div class="stream-info" id="streamStatus">
    Consultando estado de la transmisión...
   </div>
   <button class="btn-play" onclick="play()">▶ Play</button>
   <button class="btn-stop" onclick="stop()">⏹ Stop</button>
  </div>

  <div class="info">
   <h3>
    <strong>Descarga la App</strong>
   </h3>
   <a href="#">
    <img class="playbtn" src="./play.png" alt="playstore">
   </a>
  </div>
 </div>

 <script>
  const audio = document.getElementById("player");
  const streamStatus = document.getElementById("streamStatus");
  const connectingBanner = document.getElementById("connectingBanner");
  const stationTitleElement = document.getElementById("stationTitle");

  let retryTimeout = null;
  let retrying = false;

  async function loadUiConfig() {
   try {
    const response = await fetch("/api/ui-config");
    if (!response.ok) return;

    const data = await response.json();
    const stationTitle = typeof data.stationTitle === "string"
     ? data.stationTitle.trim()
     : "";

    if (!stationTitle) return;

    stationTitleElement.textContent = stationTitle;
    document.title = stationTitle + " - Web Player";
   } catch {
    // keep default title when the config endpoint is unavailable
   }
  }

  loadUiConfig();

  function showBanner() {
   connectingBanner.classList.add("visible");
  }

  function hideBanner() {
   connectingBanner.classList.remove("visible");
  }

  function clearRetry() {
   if (retryTimeout) {
    clearTimeout(retryTimeout);
    retryTimeout = null;
   }
   retrying = false;
  }

  function attemptPlay() {
   audio.load();
   audio.play().catch(() => {
    // play() promise rejected — schedule retry
    if (retrying) {
     retryTimeout = setTimeout(attemptPlay, 3000);
    }
   });
  }

  audio.addEventListener("playing", () => {
   clearRetry();
   hideBanner();
  });

  audio.addEventListener("error", () => {
   if (retrying) {
    retryTimeout = setTimeout(attemptPlay, 3000);
   }
  });

  audio.addEventListener("stalled", () => {
   if (retrying) {
    retryTimeout = setTimeout(attemptPlay, 2000);
   }
  });

  async function updateStatus() {
   try {
    const response = await fetch("/health");
    const data = await response.json();

    if (data.publisherConnected) {
     streamStatus.textContent = "🟢 Estamos en Vivo, escuchanos 🟢";
     streamStatus.style.background = "#d4edda";
     streamStatus.style.color = "#155724";
     streamStatus.style.border = "1px solid #28a745";
    } else {
     streamStatus.textContent = "❌ No estamos transmitiendo ❌";
     streamStatus.style.background = "#f8d7da";
     streamStatus.style.color = "#721c24";
     streamStatus.style.border = "1px solid #dc3545";
    }
   } catch (error) {
    streamStatus.textContent = "⚠️ No se pudo conectar al servidor";
    streamStatus.style.background = "#fff3cd";
    streamStatus.style.color = "#856404";
    streamStatus.style.border = "1px solid #ffc107";
   }
  }

  function play() {
   clearRetry();
   retrying = true;
   showBanner();
   attemptPlay();
  }

  function stop() {
   clearRetry();
   hideBanner();
   audio.pause();
   audio.currentTime = 0;
  }

  // Estado inicial
  updateStatus();

  // Actualizar cada 5 segundos
  setInterval(updateStatus, 5000);
 </script>
</body>

</html>
