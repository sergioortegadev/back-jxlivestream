<!DOCTYPE html>
<html lang="es">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>JxLiveRadio - Home</title>
 <link rel="icon" type="image/svg+xml" href="./logo.svg">
 <link rel="stylesheet" href="./style.css" />
</head>

<body class="player-page home-page">
 <div class="container">
  <h1 id="stationTitle">JxLiveRadio</h1>
  <p class="status" id="stationSubTitle">Escucha la transmisión en vivo</p>

  <img class="logo" src="./logo.svg" alt="logo">

  <div class="home-panel">
   <div class="stream-info" id="streamStatus">
    Consultando estado de la transmisión...
   </div>

   <div class="description-box desc-upper">
    <span class="description-label">Transmisión en vivo de audio</span>
    <p class="description-text">Sistema para radio online / Streaming en Vivo. Con la capacidad de mostrar estadísticas de conexión.</p>
   </div>

   <div class="description-box" id="stationDescription-div">
    <p class="description-text" id="stationDescription">Cargando descripción...</p>
   </div>

   <div class="nav-buttons">
    <a class="btn-link btn-play" href="./stats.html">📊 Estadísticas en vivo</a>
    <a class="btn-link btn-stop" href="./index.html">🎧 Ir al player</a>
   </div>
  </div>

  <div class="info">
   <h3>
    <strong>Descarga la App</strong>
   </h3>
   <a href="#">
    <img class="playbtn" src="./play.png" alt="playstore">
   </a>
  </div>
 </div>

 <script>
  const streamStatus = document.getElementById("streamStatus");
  const stationTitleElement = document.getElementById("stationTitle");
  const stationSubTitleElement = document.getElementById("stationSubTitle");
  const stationDescriptionElement = document.getElementById("stationDescription");
  const stationDescriptionDivElement = document.getElementById("stationDescription-div");

  async function loadUiConfig() {
   try {
    const response = await fetch("/api/ui-config");
    if (!response.ok) return;

    const data = await response.json();
    const stationTitle = typeof data.stationTitle === "string"
     ? data.stationTitle.trim()
     : "";
    const stationSubTitle = typeof data.stationSubTitle === "string"
     ? data.stationSubTitle.trim()
     : "";
    const stationDescription = typeof data.stationDescription === "string"
     ? data.stationDescription.trim()
     : "";

    if (stationTitle) {
     stationTitleElement.textContent = stationTitle;
     document.title = stationTitle + " - Home";
    }

    if (stationSubTitle) {
     stationSubTitleElement.textContent = stationSubTitle;
    }
    
    if (stationDescription !== '') {   
        stationDescriptionElement.textContent = stationDescription
    } else {
        stationDescriptionDivElement.style.display = 'none';
    }
    
   } catch {
    
   }
  }

  async function updateStatus() {
   try {
    const response = await fetch("/health");
    const data = await response.json();

    if (data.publisherConnected) {
     streamStatus.textContent = "🟢 Estamos en Vivo, escuchanos 🟢";
     streamStatus.style.background = "#d4edda";
     streamStatus.style.color = "#155724";
     streamStatus.style.border = "1px solid #28a745";
    } else {
     streamStatus.textContent = "❌ No estamos transmitiendo ❌";
     streamStatus.style.background = "#f8d7da";
     streamStatus.style.color = "#721c24";
     streamStatus.style.border = "1px solid #dc3545";
    }
   } catch {
    streamStatus.textContent = "⚠️ No se pudo conectar al servidor";
    streamStatus.style.background = "#fff3cd";
    streamStatus.style.color = "#856404";
    streamStatus.style.border = "1px solid #ffc107";
   }
  }

  loadUiConfig();
  updateStatus();
  setInterval(updateStatus, 5000);
 </script>
</body>

</html>
