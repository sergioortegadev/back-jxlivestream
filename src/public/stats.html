<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JxLiveRadio — Estadísticas</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>

<body class="stats-page">
  <main class="page-shell">
    <div class="page-header">
      <h1>JxLiveRadio</h1>
      <p>Dashboard de estadísticas en vivo</p>
      <a class="btn-header-stats" href="/">← Player</a>
      <a class="btn-header-stats" href="/home.html">← Home </a>
    </div>

    <img class="stats-logo" src="./logo.svg" alt="logo">

    <div class="grid">

    <div class="widget widget-full">
      <div class="widget-title">Oyentes por minuto — últimos 60 min</div>
      <div class="chart-container">
        <canvas id="chartListeners"></canvas>
      </div>
    </div>

    <div class="widget widget-numeric">
      <div class="widget-title">Tiempo promedio de escucha — últimos 15 min</div>
      <div class="widget-value" id="avgDuration">—</div>
      <div class="widget-unit">minutos</div>
    </div>

    <div class="widget widget-numeric">
      <div class="widget-title">Oyentes únicos — últimos 15 min</div>
      <div class="widget-value" id="uniqueListeners">—</div>
      <div class="widget-unit">oyentes únicos</div>
    </div>

    <div class="widget">
      <div class="widget-title">Tasa de rebote (drop rate) — últimos 15 min</div>
      <div class="chart-container">
        <canvas id="chartDropRate"></canvas>
      </div>
    </div>

    <div class="widget">
      <div class="widget-title">Errores de conexión — últimos 15 min</div>
      <div class="chart-container">
        <canvas id="chartErrors"></canvas>
      </div>
    </div>

    </div>

    <div class="status-bar" id="statusBar">
      <span class="dot"></span> Cargando datos…
    </div>
  </main>

  <script>
    Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    Chart.defaults.color = '#aaa';

    const COLOR_PURPLE = '#667eea';
    const COLOR_RED = '#e74c3c';
    const COLOR_ORANGE = '#f39c12';

    function formatTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    }

    function buildChart(canvasId, label, color) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label,
            data: [],
            borderColor: color,
            backgroundColor: color + '20',
            borderWidth: 2.5,
            pointRadius: 3,
            pointHoverRadius: 5,
            tension: 0.4,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.parsed.y}`
              }
            }
          },
          scales: {
            x: {
              grid: { color: '#f0f0f0' },
              ticks: { maxTicksLimit: 10, maxRotation: 0 }
            },
            y: {
              grid: { color: '#f0f0f0' },
              beginAtZero: true,
              ticks: { precision: 1 }
            }
          }
        }
      });
    }

    function patchChart(chart, labels, data) {
      chart.data.labels = labels;
      chart.data.datasets[0].data = data;
      chart.update('none');
    }

    const chartListeners = buildChart('chartListeners', 'Oyentes activos', COLOR_PURPLE);
    const chartDropRate = buildChart('chartDropRate', 'Drop rate %', COLOR_RED);
    const chartErrors = buildChart('chartErrors', 'Error rate %', COLOR_ORANGE);

    let resizeRaf;
    window.addEventListener('resize', () => {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => {
        chartListeners.resize();
        chartDropRate.resize();
        chartErrors.resize();
      });
    });

    async function fetchAll() {
      try {
        const [minuteRes, hourRes, intervalRes] = await Promise.all([
          fetch('/api/stats/minute-metrics?minutes=60'),
          fetch('/api/stats/unique-summary?minutes=15'),
          fetch('/api/stats/interval-metrics?minutes=15'),
        ]);

        if (!minuteRes.ok || !hourRes.ok || !intervalRes.ok) {
          throw new Error('Respuesta no válida del servidor');
        }

        const minuteData = await minuteRes.json();
        const hourData = await hourRes.json();
        const intervalData = await intervalRes.json();

        patchChart(
          chartListeners,
          minuteData.map(r => formatTime(r.timestamp)),
          minuteData.map(r => Number(r.active_listeners))
        );

        const avgEl = document.getElementById('avgDuration');
        if (hourData.length > 0) {
          const avgSec = Number(hourData[0].avg_duration || 0);
          avgEl.textContent = avgSec > 0 ? (avgSec / 60).toFixed(1) : '0';
        } else {
          avgEl.textContent = '—';
        }

        const uniqueEl = document.getElementById('uniqueListeners');
        const uniqueCount = hourData.length > 0 ? Number(hourData[0].unique_listeners || 0) : 0;
        uniqueEl.textContent = uniqueCount > 0 ? uniqueCount : '—';

        const sorted = [...intervalData].sort(
          (a, b) => new Date(a.timestamp) - new Date(b.timestamp)
        );

        patchChart(
          chartDropRate,
          sorted.map(r => formatTime(r.timestamp)),
          sorted.map(r => Number(r.drop_rate_percentage))
        );

        patchChart(
          chartErrors,
          sorted.map(r => formatTime(r.timestamp)),
          sorted.map(r => Number(r.error_rate_percentage))
        );

        const now = new Date().toLocaleTimeString('es-AR');
        document.getElementById('statusBar').innerHTML =
          `<span class="dot"></span> Última actualización: ${now} &nbsp;·&nbsp; Próxima en 60 s`;

      } catch (err) {
        console.error('[stats] Error al obtener datos:', err);
        document.getElementById('statusBar').innerHTML =
          '⚠️ Error al cargar datos. Reintentando en 60 s…';
      }
    }

    async function loadUiConfig () {
      try {
        const response = await fetch("/api/ui-config");
        if (!response.ok) return;
        
        const data = await response.json();
        const stationTitle = typeof data.stationTitle === 'string'
        ? data.stationTitle.trim()
        : "";

        if (stationTitle) {
          document.title = stationTitle + " - Estadísticas";
        }


      } catch {
        // keep default title when the config endpoint is unavailable
      }
    };

    loadUiConfig();
    fetchAll();
    setInterval(fetchAll, 60_000);

  </script>
</body>

</html>
